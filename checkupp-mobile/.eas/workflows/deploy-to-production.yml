name: Deploy to Production

defaults:
  tools:
    corepack: true

# Manual by default. Run with:
# eas workflow:run .eas/workflows/deploy-to-production.yml
#
# Uncomment this after the GitHub repo is connected in the EAS dashboard
# if you want production releases to run when main is pushed.
# on:
#   push:
#     branches: ["main"]

jobs:
  build_android:
    name: Build Android Production
    type: build
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS Production
    type: build
    params:
      platform: ios
      profile: production

  submit_ios:
    name: Submit iOS to App Store Connect
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
